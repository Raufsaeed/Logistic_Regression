<!DOCTYPE html>
<html>
<head>
    <title>ML Assignment</title>
    <style>
        body {
            font-family: Arial;
            background: #667eea;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin: 20px;
            display: inline-block;
            width: 250px;
            cursor: pointer;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        h1 {
            color: white;
        }
    </style>
</head>
<body>
    <h1>📊 Logistic Regression</h1>
    <div class="card" onclick="location.href='/bank'">
        <h2>🏦 Bank</h2>
        <p>Term Deposit Prediction</p>
        <button>Go →</button>
    </div>
    <div class="card" onclick="location.href='/flower'">
        <h2>🌸 Flower</h2>
        <p>Daisy vs Tulip</p>
        <button>Go →</button>
    </div>
</body>
</html>
