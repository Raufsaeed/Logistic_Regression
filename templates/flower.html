<!DOCTYPE html>
<html>
<head>
    <title>Flower</title>
    <style>
        body {
            font-family: Arial;
            background: #667eea;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
        .upload {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px;
            cursor: pointer;
        }
        img {
            max-width: 200px;
            margin: 20px auto;
            display: none;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 Flower Recognition</h2>
        <div class="upload" onclick="document.getElementById('file').click()">
            📁 Click to Upload
        </div>
        <input type="file" id="file" style="display:none" accept="image/*">
        <img id="preview">
        <button id="predictBtn" style="display:none">Predict</button>
        <div id="result" class="result"></div>
        <button onclick="location.href='/'">← Back</button>
    </div>
    <script>
        document.getElementById('file').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('predictBtn').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };
        
        document.getElementById('predictBtn').onclick = async () => {
            const file = document.getElementById('file').files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch('/predict_flower', {method: 'POST', body: formData});
            const json = await res.json();
            
            document.getElementById('result').innerHTML = `
                <h3>${json.result}</h3>
                <p>Confidence: ${json.confidence}</p>
            `;
            document.getElementById('result').style.background = '#d4edda';
        };
    </script>
</body>
</html>
